name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        # pandas / lightgbm を含む predictor 依存は重いので、テストが必要とする
        # 共通・API・collector の依存(+ pytest)だけをインストールする。
        run: |
          python -m pip install --upgrade pip
          pip install \
            -r docker/requirements.txt \
            -r docker/requirements-api.txt \
            -r docker/requirements-collector.txt \
            pytest
      - name: Run tests
        run: pytest
